apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: arc-taxi-meter
    namespace: apps
spec:
    interval: 10m0s
    chart:
        spec:
            chart: gha-runner-scale-set
            version: 0.9.3
            sourceRef:
                kind: HelmRepository
                name: actions-runner-controller
                namespace: core
    install:
        remediation:
            retries: 3
    upgrade:
        cleanupOnFail: true
        remediation:
            retries: 3
    uninstall:
        keepHistory: false
    values:
        runnerScaleSetName: taxi-meter
        githubConfigUrl: https://github.com/invakid404/taxi-meter
        githubConfigSecret:
            github_token: REPLACE_ME_WITH_SOPS_ENCRYPTED_TOKEN
        template:
            spec:
                containers:
                    - name: runner
                      image: ghcr.io/invakid404/runners/taxi-meter
                      imagePullPolicy: Always
                      command:
                        - /home/runner/run.sh
